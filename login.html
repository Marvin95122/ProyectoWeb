<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymControl - Acceso al Sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f4f6f9; }
    .login-card { border-radius: 10px; border-top: 5px solid #1f7c34; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div id="app" class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      
      <div class="text-center mb-4">
        <h1 class="fw-bold text-dark"><i class="bi bi-heart-pulse-fill text-success"></i> GymControl</h1>
        <p class="text-muted">Gestión integral de gimnasios</p>
      </div>

      <div class="card shadow-sm login-card border-0">
        <div class="card-body p-4">
          <h4 class="card-title text-center mb-4 fw-bold">Iniciar Sesión</h4>
          
          <form @submit.prevent="iniciarSesion">
            
            <div v-if="error" class="alert alert-danger py-2 small text-center" role="alert">
              <i class="bi bi-exclamation-triangle"></i> Credenciales incorrectas.
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold text-muted small">USUARIO O CORREO</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                <input v-model="usuario.correo" type="text" class="form-control" placeholder="admin" required>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-muted small">CONTRASEÑA</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                <input v-model="usuario.password" type="password" class="form-control" placeholder="••••••••" required>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg" :disabled="cargando">
                <span v-if="cargando" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                {{ cargando ? 'Ingresando...' : 'Acceder al panel' }}
              </button>
            </div>
          </form>

        </div>
      </div>
      
      <div class="text-center mt-3 text-muted small">
        &copy; 2026 GymControl
      </div>

    </div>
  </div>
</div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          usuario: { correo: '', password: '' },
          cargando: false,
          error: false
        }
      },
      methods: {
        iniciarSesion() {
          this.cargando = true;
          this.error = false;
          setTimeout(() => {
            this.cargando = false;
            window.location.href = 'dashboard.html';
          }, 400);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
