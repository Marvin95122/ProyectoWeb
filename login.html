<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GymControl - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
<div id="app" class="d-flex flex-column min-vh-100">

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="login.html">
          <span class="badge bg-success me-2 fs-5">G</span> GymControl
        </a>
      </div>
    </nav>
  </header>

  <main class="container my-5 flex-grow-1">
    <div class="row justify-content-center g-4">
      <section class="col-md-5">
        <div class="card shadow-sm border-0">
          <div class="card-header bg-white text-center py-3">
            <h2 class="h4 mb-0 fw-bold">Acceso del personal</h2>
            <p class="text-muted small mb-0">Ingresa tus credenciales</p>
          </div>
          <div class="card-body p-4">
            
            <form @submit.prevent="iniciarSesion">
              
              <div v-if="error" class="alert alert-danger py-2 small" role="alert">
                Correo o contraseña incorrectos.
              </div>

              <div class="mb-3">
                <label class="form-label fw-bold">Correo</label>
                <input v-model="usuario.correo" type="email" class="form-control" required>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">Contraseña</label>
                <input v-model="usuario.password" type="password" class="form-control" required>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg" :disabled="cargando">
                  <span v-if="cargando" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  {{ cargando ? 'Verificando...' : 'Ingresar al sistema' }}
                </button>
              </div>
            </form>

          </div>
        </div>
      </section>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-auto">
    <p class="mb-0 small">&copy; 2026 GymControl</p>
  </footer>

</div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          usuario: { correo: '', password: '' },
          cargando: false,
          error: false
        }
      },
      methods: {
        iniciarSesion() {
          this.cargando = true;
          this.error = false;
          // Simulamos una carga
          setTimeout(() => {
            this.cargando = false;
            window.location.href = 'index.html';
          }, 500);
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
